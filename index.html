<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Trade Journal</title>
<script>
// Chart.js loaded asynchronously — won't block main app if CDN fails
(function(){
  var s=document.createElement('script');
  s.src='https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js';
  s.onerror=function(){console.warn('Chart.js CDN failed — charts disabled. Open via Netlify for full functionality.');};
  document.head.appendChild(s);
})();
</script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0f1117;--bg2:#181c27;--bg3:#1e2336;--bg4:#252b3d;
  --border:#2a3050;--border2:#343d5c;
  --text:#e2e8f0;--text2:#8892b0;--text3:#4a5578;
  --green:#00d4aa;--green-bg:rgba(0,212,170,0.12);
  --red:#d0d0d0;--red-bg:rgba(255,255,255,0.07);
  --blue:#4f8ef7;--blue-bg:rgba(79,142,247,0.12);
  --yellow:#f0b429;--yellow-bg:rgba(240,180,41,0.12);
  --r:8px;--rl:12px;
  /* ── Typography scale ─────────────────── */
  --fs-2xs: 11px;   /* labels, uppercase caps */
  --fs-xs:  12px;   /* secondary text, badges */
  --fs-sm:  13px;   /* table body, inputs */
  --fs-md:  14px;   /* base UI text */
  --fs-lg:  15px;   /* section headings, topbar */
  --fs-xl:  24px;   /* metric values */
  --fs-2xl: 28px;   /* hero numbers */
  --lh-tight: 1.3;
  --lh-base:  1.55;
  --lh-loose: 1.75;
}
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
html,body{
  height:100%;
  font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  background:var(--bg);color:var(--text);
  font-size:var(--fs-md);
  line-height:var(--lh-base);
  -webkit-font-smoothing:antialiased;
  letter-spacing:-0.01em;
}
.shell{display:flex;height:100vh;overflow:hidden;position:relative}

/* ── Sidebar ────────────────────────────── */
.sidebar{
  width:64px;background:var(--bg2);border-right:1px solid var(--border);
  display:flex;flex-direction:column;align-items:center;
  padding:16px 0;gap:6px;flex-shrink:0;
}
.logo{
  width:38px;height:38px;background:var(--blue);border-radius:10px;
  display:flex;align-items:center;justify-content:center;
  font-weight:700;font-size:15px;color:#fff;margin-bottom:18px;
  letter-spacing:-0.5px;
}
.ni{
  width:44px;height:44px;display:flex;align-items:center;justify-content:center;
  border-radius:10px;cursor:pointer;color:var(--text3);transition:all 0.15s;position:relative;
}
.ni:hover{background:var(--bg4);color:var(--text2)}
.ni.active{background:var(--blue-bg);color:var(--blue)}
/* Sidebar icons — 22px, slightly bolder stroke for legibility */
.ni svg{width:22px;height:22px;stroke:currentColor;fill:none;stroke-width:1.7;stroke-linecap:round;stroke-linejoin:round}
.ni-tip{
  position:absolute;left:56px;background:var(--bg4);border:1px solid var(--border2);
  color:var(--text);font-size:var(--fs-xs);font-weight:500;
  padding:5px 11px;border-radius:6px;white-space:nowrap;
  pointer-events:none;opacity:0;transition:opacity 0.15s;z-index:999;
}
.ni:hover .ni-tip{opacity:1}
.spacer{flex:1}

/* ── Topbar ─────────────────────────────── */
.body{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{
  background:var(--bg2);border-bottom:1px solid var(--border);
  padding:0 24px;height:58px;display:flex;align-items:center;gap:12px;flex-shrink:0;
}
.topbar-title{font-size:var(--fs-lg);font-weight:600;flex:1;letter-spacing:-0.3px}
.period-tabs{display:flex;gap:2px;background:var(--bg3);border-radius:8px;padding:3px}
.pt{padding:5px 13px;border-radius:6px;font-size:var(--fs-xs);font-weight:500;cursor:pointer;color:var(--text2);transition:all 0.15s;user-select:none}
.pt.active{background:var(--bg4);color:var(--text);font-weight:600}
.add-btn{
  background:var(--blue);color:#fff;border:none;border-radius:8px;
  padding:8px 18px;font-size:var(--fs-sm);font-weight:600;
  cursor:pointer;display:flex;align-items:center;gap:6px;letter-spacing:-0.1px;
}
.add-btn:hover{opacity:0.88}
.add-btn svg{width:13px;height:13px;stroke:currentColor;fill:none;stroke-width:2.5}

/* ── Pages ──────────────────────────────── */
.page{flex:1;overflow-y:auto;padding:22px 26px;display:none;line-height:var(--lh-base)}
.page.active{display:block}

/* ── Metric cards ───────────────────────── */
.metrics-row{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-bottom:20px}
.mc{background:var(--bg2);border:1px solid var(--border);border-radius:var(--rl);padding:18px 20px}
.mc-lbl{
  font-size:var(--fs-2xs);color:var(--text3);
  text-transform:uppercase;letter-spacing:0.08em;
  margin-bottom:8px;font-weight:600;
}
/* Metric numbers — large, tight, high-impact */
.mc-val{font-size:var(--fs-xl);font-weight:700;letter-spacing:-0.8px;line-height:var(--lh-tight)}
.mc-sub{font-size:var(--fs-xs);margin-top:6px;color:var(--text2);line-height:var(--lh-base)}
.g{color:var(--green)}.r{color:var(--red)}.b{color:var(--blue)}.y{color:var(--yellow)}.mut{color:var(--text2)}

/* ── Charts ─────────────────────────────── */
.charts-row{display:grid;grid-template-columns:2fr 1fr;gap:12px;margin-bottom:20px}
.cc{background:var(--bg2);border:1px solid var(--border);border-radius:var(--rl);padding:18px 20px}
.cc-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.cc-title{font-size:var(--fs-md);font-weight:600;letter-spacing:-0.2px}
.legend{display:flex;gap:16px}
.li{display:flex;align-items:center;gap:5px;font-size:var(--fs-xs);color:var(--text2)}
.ld{width:9px;height:9px;border-radius:2px}

/* ── Table ──────────────────────────────── */
.table-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--rl);overflow:hidden}
.tc-hd{padding:14px 20px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border)}
.tc-title{font-size:var(--fs-md);font-weight:600;letter-spacing:-0.2px}
.filters{display:flex;gap:6px}
.fil{padding:4px 13px;border-radius:6px;font-size:var(--fs-xs);font-weight:500;cursor:pointer;border:1px solid var(--border);background:transparent;color:var(--text2);transition:all 0.15s}
.fil.active{background:var(--blue-bg);border-color:var(--blue);color:var(--blue)}
table{width:100%;border-collapse:collapse}
thead th{
  padding:10px 16px;
  font-size:var(--fs-2xs);font-weight:700;
  color:var(--text3);text-transform:uppercase;letter-spacing:0.07em;
  text-align:left;border-bottom:1px solid var(--border);white-space:nowrap;
}
tbody tr.trow{cursor:pointer;transition:background 0.1s}
tbody tr.trow:hover{background:var(--bg3)}
/* Table body — 13px, generous row height, good line-height */
tbody td{
  padding:13px 16px;
  font-size:var(--fs-sm);color:var(--text);
  border-bottom:1px solid rgba(42,48,80,0.5);
  white-space:nowrap;line-height:var(--lh-base);
}
.badge{
  display:inline-flex;align-items:center;
  padding:3px 10px;border-radius:5px;
  font-size:var(--fs-2xs);font-weight:700;letter-spacing:0.04em;
}
.badge.long{background:var(--green-bg);color:var(--green)}
.badge.short{background:var(--red-bg);color:var(--red)}
.badge.open{background:var(--blue-bg);color:var(--blue)}
.badge.closed{background:rgba(74,85,120,0.3);color:var(--text2)}

/* ── Expand row ─────────────────────────── */
.expand-cell{padding:0!important;border-bottom:1px solid var(--border)!important}
.exp-inner{padding:18px 20px;background:var(--bg3)}
.exp-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:14px}
.t-sec-lbl{font-size:var(--fs-2xs);color:var(--text3);text-transform:uppercase;letter-spacing:0.07em;margin-bottom:8px;font-weight:700}
.t-tbl{width:100%;border-collapse:collapse;font-size:var(--fs-sm)}
.t-tbl th{color:var(--text3);padding:6px 10px;text-align:left;border-bottom:1px solid var(--border);font-weight:700;font-size:var(--fs-2xs)}
.t-tbl td{padding:7px 10px;color:var(--text);border-bottom:1px solid rgba(42,48,80,0.4);line-height:var(--lh-base)}
.rr-row{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-bottom:14px}
.rr-box{background:var(--bg4);border-radius:8px;padding:11px 13px}
.rr-box .lbl{font-size:var(--fs-2xs);color:var(--text3);text-transform:uppercase;letter-spacing:0.07em;font-weight:600}
.rr-box .val{font-size:17px;font-weight:700;margin-top:5px;letter-spacing:-0.3px;line-height:var(--lh-tight)}
.inp-row{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.inp-row label{font-size:var(--fs-2xs);color:var(--text3);font-weight:600;text-transform:uppercase;letter-spacing:0.05em}
.inp-row input{background:var(--bg4);border:1px solid var(--border2);border-radius:6px;color:var(--text);padding:6px 10px;font-size:var(--fs-sm);width:100px}
.fetch-btn{background:var(--blue-bg);border:1px solid var(--blue);color:var(--blue);border-radius:6px;padding:6px 13px;font-size:var(--fs-sm);cursor:pointer;font-weight:600}
.fetch-btn:hover{background:rgba(79,142,247,0.2)}

/* ── Calendar ───────────────────────────── */
.cal-day{background:var(--bg3);border-radius:7px;padding:8px;min-height:62px;font-size:var(--fs-xs);color:var(--text3);border:1px solid transparent}
.cal-day.win{background:var(--green-bg);border-color:rgba(0,212,170,0.25)}
.cal-day.loss{background:rgba(255,255,255,0.05);border-color:rgba(255,255,255,0.15)}
.cal-day-num{font-weight:700;margin-bottom:4px;font-size:var(--fs-sm);letter-spacing:-0.1px}
.cal-pnl{font-size:var(--fs-xs);font-weight:700}

/* ── Notebook ───────────────────────────── */
.note-area{
  width:100%;background:var(--bg3);border:1px solid var(--border);
  border-radius:var(--r);color:var(--text);
  padding:13px 15px;font-size:var(--fs-sm);
  resize:vertical;min-height:110px;font-family:inherit;
  line-height:var(--lh-loose);
}
.note-area:focus{outline:none;border-color:var(--blue)}
.note-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--rl);padding:18px 20px;margin-bottom:12px}

/* ── Modal ──────────────────────────────── */
.modal-overlay{display:none;position:absolute;inset:0;background:rgba(0,0,0,0.65);z-index:100;align-items:center;justify-content:center}
.modal{background:var(--bg2);border:1px solid var(--border2);border-radius:var(--rl);padding:24px;width:460px;max-width:95vw}
.modal h2{font-size:var(--fs-lg);font-weight:700;margin-bottom:18px;letter-spacing:-0.3px}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
.fg{display:flex;flex-direction:column;gap:5px}
.fg label{font-size:var(--fs-2xs);color:var(--text3);text-transform:uppercase;letter-spacing:0.07em;font-weight:700}
.fg input,.fg select{
  background:var(--bg4);border:1px solid var(--border2);border-radius:7px;
  color:var(--text);padding:9px 12px;font-size:var(--fs-sm);
  line-height:var(--lh-base);
}
.fg input:focus,.fg select:focus{outline:none;border-color:var(--blue)}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:18px}
.modal-cancel{background:transparent;border:1px solid var(--border2);color:var(--text2);border-radius:7px;padding:8px 18px;font-size:var(--fs-sm);font-weight:500;cursor:pointer}
.modal-save{background:var(--blue);border:none;color:#fff;border-radius:7px;padding:8px 18px;font-size:var(--fs-sm);font-weight:700;cursor:pointer}

/* ── Stat grid ──────────────────────────── */
.stat-grid6{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:20px}

/* ── Toast ──────────────────────────────── */
.toast{
  position:absolute;bottom:22px;right:22px;
  background:var(--bg4);border:1px solid var(--border2);
  color:var(--text);padding:12px 20px;border-radius:10px;
  font-size:var(--fs-sm);font-weight:500;
  z-index:200;opacity:0;transition:opacity 0.3s;pointer-events:none;
}
.toast.show{opacity:1}

/* ── Settings ───────────────────────────── */
.settings-row{display:flex;justify-content:space-between;align-items:center;padding:15px 0;border-bottom:1px solid var(--border)}
.settings-row:last-child{border-bottom:none}
.settings-row .lbl{font-size:var(--fs-md);color:var(--text);font-weight:500;letter-spacing:-0.1px}
.settings-row .sub{font-size:var(--fs-xs);color:var(--text3);margin-top:3px;line-height:var(--lh-base)}
.toggle{width:40px;height:23px;border-radius:12px;cursor:pointer;position:relative;transition:background 0.2s}
.toggle.on{background:var(--green)}
.toggle.off{background:var(--bg4);border:1px solid var(--border2)}
.toggle-knob{width:19px;height:19px;background:#fff;border-radius:50%;position:absolute;top:2px;transition:left 0.2s}
.toggle.on .toggle-knob{left:19px}
.toggle.off .toggle-knob{left:2px}
</style>
</head>
<body>

<div class="shell">
  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="logo">SJ</div>
    <div class="ni active" onclick="navTo('dashboard',this)" title="">
      <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/></svg>
      <span class="ni-tip">Dashboard</span>
    </div>
    <div class="ni" onclick="navTo('trades',this)">
      <svg viewBox="0 0 24 24"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
      <span class="ni-tip">Trades</span>
    </div>
    <div class="ni" onclick="navTo('calendar',this)">
      <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
      <span class="ni-tip">Calendar</span>
    </div>
    <div class="ni" onclick="navTo('analytics',this)">
      <svg viewBox="0 0 24 24"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
      <span class="ni-tip">Analytics</span>
    </div>
    <div class="ni" onclick="navTo('notebook',this)">
      <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
      <span class="ni-tip">Notebook</span>
    </div>
    <div class="spacer"></div>
    <div class="ni" onclick="navTo('settings',this)">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06-.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
      <span class="ni-tip">Settings</span>
    </div>
  </aside>

  <div class="body">
    <!-- Topbar -->
    <div class="topbar">
      <span class="topbar-title" id="page-title">Dashboard</span>
      <div class="period-tabs" id="period-tabs">
        <div class="pt" onclick="setPt(this)">1D</div>
        <div class="pt" onclick="setPt(this)">1W</div>
        <div class="pt active" onclick="setPt(this)">1M</div>
        <div class="pt" onclick="setPt(this)">3M</div>
        <div class="pt" onclick="setPt(this)">YTD</div>
        <div class="pt" onclick="setPt(this)">All</div>
      </div>
      <label style="display:flex;align-items:center;gap:6px;background:var(--bg3);border:1px solid var(--border2);color:var(--text2);border-radius:8px;padding:7px 14px;font-size:var(--fs-sm);font-weight:500;cursor:pointer;white-space:nowrap">
        <svg width="13" height="13" viewBox="0 0 24 24" stroke="currentColor" fill="none" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        Import CSV
        <input type="file" accept=".csv" style="display:none" onchange="handleCsvImport(this)"/>
      </label>
      <button class="add-btn" onclick="openAddModal()">
        <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        Add trade
      </button>
    </div>

    <!-- Pages -->
    <div id="page-dashboard" class="page active"></div>
    <div id="page-trades" class="page"></div>
    <div id="page-calendar" class="page"></div>
    <div id="page-analytics" class="page"></div>
    <div id="page-notebook" class="page"></div>
    <div id="page-settings" class="page"></div>
  </div>
  <!-- Modal inside shell so position:absolute works -->
  <div class="modal-overlay" id="modal">
    <div class="modal" onclick="event.stopPropagation()">
      <h2>Add trade entry / exit</h2>
      <div class="form-grid">
        <div class="fg"><label>Ticker</label><input id="f-ticker" placeholder="AAPL" style="text-transform:uppercase"/></div>
        <div class="fg"><label>Direction</label><select id="f-dir"><option value="long">Long</option><option value="short">Short</option></select></div>
        <div class="fg"><label>Type</label><select id="f-type"><option value="buy">Buy (entry)</option><option value="sell">Sell (exit)</option></select></div>
        <div class="fg"><label>Add to trade</label><select id="f-parent"><option value="new">New trade</option></select></div>
        <div class="fg"><label>Quantity</label><input id="f-qty" type="number" placeholder="1" min="1"/></div>
        <div class="fg"><label>Price $</label><input id="f-price" type="number" step="0.01" placeholder="150.00" min="0.01"/></div>
        <div class="fg"><label>Date</label><input id="f-date" type="date"/></div>
        <div class="fg"><label>Setup</label><select id="f-setup"><option>Breakout</option><option>Pullback</option><option>Reversal</option><option>Momentum</option><option>Other</option></select></div>
      </div>
      <div class="fg" style="margin-bottom:0"><label>Notes</label><input id="f-notes" placeholder="Optional notes..."/></div>
      <!-- Futures -->
      <div style="margin-top:10px;padding:10px;background:var(--bg3);border-radius:6px;border:1px solid var(--border)">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">
          <label style="display:flex;align-items:center;gap:8px;cursor:pointer;font-size:12px;color:var(--text2)">
            <input type="checkbox" id="f-futures" onchange="onFuturesToggle(this.checked)"
              style="width:14px;height:14px;accent-color:var(--blue)"/>
            Futures contract (tick-based P&L)
          </label>
          <select id="f-preset" onchange="applyFuturesPreset(this.value)"
            style="background:var(--bg4);border:1px solid var(--border2);border-radius:5px;color:var(--text2);padding:3px 8px;font-size:11px;display:none">
            <option value="">Preset...</option>
            <option value="ES">ES (S&amp;P 500)</option>
            <option value="MES">MES (Micro S&amp;P)</option>
            <option value="NQ">NQ (Nasdaq)</option>
            <option value="MNQ">MNQ (Micro Nasdaq)</option>
            <option value="MGC">MGC (Micro Gold)</option>
            <option value="GC">GC (Gold)</option>
            <option value="CL">CL (Crude Oil)</option>
            <option value="MCL">MCL (Micro Crude)</option>
          </select>
        </div>
        <div id="futures-extra" style="display:none;gap:10px;flex-wrap:wrap">
          <div class="fg"><label>Tick Size</label><input id="f-ticksize" type="number" step="any" placeholder="0.25" oninput="updatePointVal()"/></div>
          <div class="fg"><label>Tick Value $</label><input id="f-tickvalue" type="number" step="any" placeholder="12.50" oninput="updatePointVal()"/></div>
          <div id="f-pointval-display" style="display:flex;flex-direction:column;gap:3px;justify-content:flex-end">

  setup:      ['Breakout','Pullback','Reversal','Momentum','Range','Gap-fill','VWAP-bounce','News-play'],

function save(){

  }catch(e){console.warn('localStorage not available — data will not persist between sessions');}

// ── Calc ──────────────────────────────────────────────────────────────
const tavg=a=>{let s=0,q=0;a.forEach(x=>{s+=x.qty*x.px;q+=x.qty});return q?s/q:0};
const tqty=a=>a.reduce((s,x)=>s+x.qty,0);
const f2=n=>parseFloat(n.toFixed(2));

function calcPnl(priceDiff, qty, t){
  // Futures: P&L = (priceDiff / tickSize) * tickValue * qty
  // Stocks:  P&L = priceDiff * qty
  if(t.isFutures && t.tickSize>0 && t.tickValue>0){
    return f2((priceDiff/t.tickSize)*t.tickValue*qty);
  }
  return f2(priceDiff*qty);
}

function calc(t){
  const ae=tavg(t.entries),ax=tavg(t.exits);
  const te=tqty(t.entries),tx=tqty(t.exits),oq=te-tx;
  const dir=t.dir==='long'?1:-1;

  const rpl=f2(t.exits.reduce((s,e)=>s+calcPnl((e.px-ae)*dir,e.qty,t),0));
  const upl=f2(oq>0?calcPnl((t.curPx-ae)*dir,oq,t):0);

  // % calc: for futures use ticks as proxy for %
  const rpc=f2(ae&&tx?(t.isFutures&&t.tickSize>0?((ae-ax??(ax-ae))/ae*100*dir):( rpl/(ae*tx))*100):0);
  const upc=f2(ae&&oq?((t.curPx-ae)/ae)*100*dir:0);

  const sld=Math.abs(ae-t.sl),tpd=Math.abs(t.tp-ae);
  const slPnl=sld>0?calcPnl(sld,te,t):0;
  const tpPnl=tpd>0?calcPnl(tpd,te,t):0;

  // Tick info for display
  const slTicks=t.isFutures&&t.tickSize>0?Math.round(sld/t.tickSize):null;
  const tpTicks=t.isFutures&&t.tickSize>0?Math.round(tpd/t.tickSize):null;
  const curTicks=t.isFutures&&t.tickSize>0?Math.round(Math.abs(t.curPx-ae)/t.tickSize):null;

  return{ae,ax,te,tx,oq,rpl,upl,rpc,upc,
    rr:f2(sld?tpd/sld:0),
    potL:f2(slPnl),potG:f2(tpPnl),
    slTicks,tpTicks,curTicks};
}

function navTo(page,el){

  document.getElementById('page-title').textContent=titles[page];
  document.getElementById('period-tabs').style.display=(page==='dashboard'||page==='analytics')?'flex':'none';
  renderPage(page);
}
function setPt(el){document.querySelectorAll('.pt').forEach(x=>x.classList.remove('active'));el.classList.add('active');}

// ── Dashboard ─────────────────────────────────────────────────────────
function renderDashboard(){
  let tRL=0,tUL=0,wins=0,losses=0,rrSum=0,rrN=0;
  trades.forEach(t=>{const m=calc(t);tRL+=m.rpl;tUL+=m.upl;});
  trades.filter(t=>t.status==='closed').forEach(t=>{
    const m=calc(t);if(m.rpl>0)wins++;else losses++;
    if(m.rr>0){rrSum+=m.rr;rrN++;}
  });
  const wr=(wins+losses>0)?((wins/(wins+losses))*100).toFixed(0):0;
  const ar=rrN?(rrSum/rrN).toFixed(2):'—';
  const open=trades.filter(t=>t.status==='open').length;
  const closed=trades.filter(t=>t.status==='closed').length;
  document.getElementById('page-dashboard').innerHTML=`
    <div class="metrics-row">
      <div class="mc"><div class="mc-lbl">Net Realized P&L</div><div class="mc-val ${tRL>=0?'g':'mut'}">${tRL>=0?'+':'-'}$${Math.abs(tRL).toFixed(2)}</div><div class="mc-sub">${open} open / ${closed} closed</div></div>
      <div class="mc"><div class="mc-lbl">Unrealized P&L</div><div class="mc-val ${tUL>=0?'g':'mut'}">${tUL>=0?'+':'-'}$${Math.abs(tUL).toFixed(2)}</div><div class="mc-sub">${open} open positions</div></div>

      <div class="mc"><div class="mc-lbl">Avg R:R</div><div class="mc-val ${parseFloat(ar)>=1.5?'g':parseFloat(ar)>=1?'y':'r'}">${ar}</div><div class="mc-sub">across ${closed} trades</div></div>
      <div class="mc"><div class="mc-lbl">Profit Factor</div><div class="mc-val b">${wins&&losses?(wins/losses).toFixed(2):wins?'∞':'0.00'}</div><div class="mc-sub">wins ÷ losses</div></div>
    </div>

      <div class="cc">
        <div class="cc-hd"><span class="cc-title">Cumulative P&L</span>
          <div class="legend">
            <span class="li"><span class="ld" style="background:#00d4aa"></span>Realized</span>
            <span class="li"><span class="ld" style="background:#4f8ef7;opacity:.6"></span>Unrealized</span>
          </div>
        </div>

        <div style="position:relative;height:120px"><canvas id="c-wl" role="img" aria-label="Win loss donut"></canvas></div>

      </div>
    </div>

      <div class="tc-hd"><span class="tc-title">Recent trades</span>
        <div class="filters">
          <span class="fil ${tFilter==='all'?'active':''}" onclick="setFilter('all',this)">All</span>
          <span class="fil ${tFilter==='open'?'active':''}" onclick="setFilter('open',this)">Open</span>
          <span class="fil ${tFilter==='closed'?'active':''}" onclick="setFilter('closed',this)">Closed</span>
        </div>
      </div>
      <div id="trade-table-wrap"></div>

  setTimeout(()=>{renderCharts();renderTradeTable('trade-table-wrap');},50);

function renderCharts(){
  if(typeof Chart==='undefined'){
    const el=document.getElementById('c-pnl');
    if(el)el.parentElement.innerHTML='<div style="height:160px;display:flex;align-items:center;justify-content:center;color:var(--text3);font-size:12px">Charts require internet connection.<br>Open via Netlify for full functionality.</div>';
    return;
  }
  const closed=trades.filter(t=>t.status==='closed');
  const wins=closed.filter(t=>calc(t).rpl>0).length;
  const losses=closed.length-wins;
  let cum=0;
  const cLabels=['',...closed.map(t=>t.ticker)];
  const cData=[0,...closed.map(t=>{cum+=calc(t).rpl;return f2(cum);})];
  const totalUL=trades.filter(t=>t.status==='open').reduce((s,t)=>s+calc(t).upl,0);
  if(window._c1)window._c1.destroy();
  const ctx1=document.getElementById('c-pnl');
  if(ctx1)window._c1=new Chart(ctx1,{type:'line',
    data:{labels:cLabels,datasets:[
      {label:'Realized',data:cData,borderColor:'#00d4aa',backgroundColor:'rgba(0,212,170,0.07)',fill:true,tension:0.35,pointRadius:3,pointBackgroundColor:'#00d4aa',borderWidth:2},
      {label:'Unrealized',data:[...cData.map(()=>null),f2(cum+totalUL)],borderColor:'#4f8ef7',borderDash:[5,3],pointRadius:4,pointBackgroundColor:'#4f8ef7',borderWidth:1.5,spanGaps:true}
    ]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},
      scales:{x:{grid:{color:'rgba(42,48,80,0.5)'},ticks:{color:'#4a5578',font:{size:10}}},
              y:{grid:{color:'rgba(42,48,80,0.5)'},ticks:{color:'#4a5578',font:{size:10},callback:v=>'$'+v}}}}
  });
  if(window._c2)window._c2.destroy();
  const ctx2=document.getElementById('c-wl');
  if(ctx2){
    window._c2=new Chart(ctx2,{type:'doughnut',
      data:{labels:['Wins','Losses'],datasets:[{data:[wins,losses],backgroundColor:['#00d4aa','#c8c8c8'],borderWidth:0,hoverOffset:3}]},
      options:{responsive:true,maintainAspectRatio:false,cutout:'68%',plugins:{legend:{display:false}}}
    });
    const tot=wins+losses||1;
    document.getElementById('wl-leg').innerHTML=`
      <span style="display:flex;align-items:center;gap:4px"><span style="width:7px;height:7px;border-radius:1px;background:#00d4aa"></span>Wins ${wins} (${((wins/tot)*100).toFixed(0)}%)</span>
      <span style="display:flex;align-items:center;gap:4px"><span style="width:7px;height:7px;border-radius:1px;background:#c8c8c8"></span>Losses ${losses} (${((losses/tot)*100).toFixed(0)}%)</span>`;
  }
}

// ── Calendar ──────────────────────────────────────────────────────────
let calYear=2026, calMonth=3; // 0-indexed month, April=3

function renderCalendar(){
  const pnlByDay={};
  trades.forEach(t=>{
    const m=calc(t);
    t.exits.forEach(e=>{
      const pnl=t.isFutures&&t.tickSize>0&&t.tickValue>0
        ? calcPnl((e.px-m.ae)*(t.dir==='long'?1:-1),e.qty,t)
        : f2((e.px-m.ae)*e.qty*(t.dir==='long'?1:-1));
      pnlByDay[e.d]=(pnlByDay[e.d]||0)+pnl;
    });
  });

  const monthNames=['January','February','March','April','May','June','July','August','September','October','November','December'];
  const daysInMonth=new Date(calYear,calMonth+1,0).getDate();
  const firstDow=new Date(calYear,calMonth,1).getDay(); // 0=Sun
  const dayHeaders=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

  let cal=`<div class="cc" style="margin-bottom:16px">
    <div class="cc-hd">
      <div style="display:flex;align-items:center;gap:10px">
        <button onclick="shiftCal(-1)" style="background:var(--bg4);border:1px solid var(--border2);color:var(--text2);border-radius:5px;padding:3px 10px;font-size:13px;cursor:pointer">‹</button>
        <span class="cc-title">${monthNames[calMonth]} ${calYear}</span>
        <button onclick="shiftCal(1)" style="background:var(--bg4);border:1px solid var(--border2);color:var(--text2);border-radius:5px;padding:3px 10px;font-size:13px;cursor:pointer">›</button>
      </div>
      <button onclick="calYear=new Date().getFullYear();calMonth=new Date().getMonth();renderCalendar()" style="background:transparent;border:1px solid var(--border2);color:var(--text2);border-radius:5px;padding:3px 10px;font-size:11px;cursor:pointer">Today</button>
    </div>
    <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:6px">
      ${dayHeaders.map(d=>`<div style="text-align:center;font-size:10px;color:var(--text3);padding:4px">${d}</div>`).join('')}
    </div>
    <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:3px">`;

  for(let i=0;i<firstDow;i++) cal+=`<div></div>`;

  for(let d=1;d<=daysInMonth;d++){
    const key=`${calYear}-${String(calMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const pnl=pnlByDay[key];
    const has=pnl!==undefined;
    const cls=has?(pnl>=0?'win':'loss'):'';
    const isToday=new Date().getFullYear()===calYear&&new Date().getMonth()===calMonth&&new Date().getDate()===d;
    cal+=`<div class="cal-day ${cls}" style="${isToday?'outline:1.5px solid var(--blue);outline-offset:-1px':''}">
      <div class="cal-day-num" style="color:${cls==='win'?'#00d4aa':cls==='loss'?'#c8c8c8':isToday?'var(--blue)':'var(--text3)'}">${d}</div>
      ${has?`<div class="cal-pnl" style="color:${pnl>=0?'#00d4aa':'#c8c8c8'}">${pnl>=0?'+':'-'}$${Math.abs(pnl).toFixed(0)}</div>`:''}
    </div>`;
  }

  const vals=Object.values(pnlByDay);
  const monthVals=Object.entries(pnlByDay)
    .filter(([k])=>k.startsWith(`${calYear}-${String(calMonth+1).padStart(2,'0')}`))
    .map(([,v])=>v);
  const best=monthVals.length?Math.max(...monthVals):0;
  const worst=monthVals.length?Math.min(...monthVals):0;
  const monthTotal=monthVals.reduce((s,v)=>s+v,0);

  cal+=`</div></div>
  <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:10px">
    <div class="mc"><div class="mc-lbl">Month P&L</div><div class="mc-val ${monthTotal>=0?'g':'mut'}">${monthTotal>=0?'+':'-'}$${Math.abs(monthTotal).toFixed(2)}</div></div>
    <div class="mc"><div class="mc-lbl">Best day</div><div class="mc-val g">${monthVals.length?'+$'+best.toFixed(2):'—'}</div></div>
    <div class="mc"><div class="mc-lbl">Worst day</div><div class="mc-val mut">${monthVals.length?(worst>=0?'+':'-')+'$'+Math.abs(worst).toFixed(2):'—'}</div></div>
    <div class="mc"><div class="mc-lbl">Trading days</div><div class="mc-val b">${monthVals.length}</div><div class="mc-sub">with exits</div></div>
  </div>`;
  document.getElementById('page-calendar').innerHTML=cal;
}

function shiftCal(dir){
  calMonth+=dir;
  if(calMonth>11){calMonth=0;calYear++;}
  if(calMonth<0){calMonth=11;calYear--;}
  renderCalendar();
}

// ── Analytics ─────────────────────────────────────────────────────────
function renderAnalytics(){
  const closed=trades.filter(t=>t.status==='closed');
  const wins=closed.filter(t=>calc(t).rpl>0).length;
  const losses=closed.length-wins;
  const winPL=closed.filter(t=>calc(t).rpl>0).reduce((s,t)=>s+calc(t).rpl,0);
  const lossPL=closed.filter(t=>calc(t).rpl<0).reduce((s,t)=>s+calc(t).rpl,0);
  let rrS=0,rrN=0;closed.forEach(t=>{const r=calc(t).rr;if(r>0){rrS+=r;rrN++;}});
  document.getElementById('page-analytics').innerHTML=`
    <div class="stat-grid6">
      <div class="mc"><div class="mc-lbl">Win Rate</div><div class="mc-val ${wins/(wins+losses||1)>=0.5?'g':'mut'}">${closed.length?((wins/closed.length)*100).toFixed(0):0}%</div><div class="mc-sub">${wins}W / ${losses}L</div></div>
      <div class="mc"><div class="mc-lbl">Avg Win</div><div class="mc-val g">+$${wins?(winPL/wins).toFixed(2):'0.00'}</div><div class="mc-sub">per winning trade</div></div>
      <div class="mc"><div class="mc-lbl">Avg Loss</div><div class="mc-val mut">-$${losses?(Math.abs(lossPL)/losses).toFixed(2):'0.00'}</div><div class="mc-sub">per losing trade</div></div>
      <div class="mc"><div class="mc-lbl">Profit Factor</div><div class="mc-val b">${wins&&losses?(wins/losses).toFixed(2):wins?'∞':'0.00'}</div></div>
      <div class="mc"><div class="mc-lbl">Total Closed</div><div class="mc-val mut">${closed.length}</div></div>
      <div class="mc"><div class="mc-lbl">Avg R:R</div><div class="mc-val y">${rrN?(rrS/rrN).toFixed(2):'—'}</div></div>
    </div>
    <div class="cc">
      <div class="cc-hd"><span class="cc-title">P&L per trade</span></div>
      <div style="position:relative;height:180px"><canvas id="c-bar" role="img" aria-label="P&L per trade bar chart"></canvas></div>
    </div>`;
  setTimeout(()=>{
    if(typeof Chart==='undefined')return;
    if(window._c3)window._c3.destroy();
    const ctx=document.getElementById('c-bar');
    if(ctx)window._c3=new Chart(ctx,{type:'bar',
      data:{labels:closed.map(t=>t.ticker),datasets:[{data:closed.map(t=>calc(t).rpl),backgroundColor:closed.map(t=>calc(t).rpl>=0?'#00d4aa':'#c8c8c8'),borderWidth:0}]},
      options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},
        scales:{x:{grid:{color:'rgba(42,48,80,0.5)'},ticks:{color:'#4a5578',font:{size:11}}},
                y:{grid:{color:'rgba(42,48,80,0.5)'},ticks:{color:'#4a5578',font:{size:10},callback:v=>'$'+v}}}}
    });
  },50);
}

function updT(id,f,v){

  const strFields=['note','setup'];
  const numFields=['sl','tp','curPx','tickSize','tickValue'];

function toggleFutures(id,on){

function addTagFromSelect(id,sel){
  const tag=sel.value;if(!tag)return;

  if(!t.tags.includes(tag))t.tags.push(tag);

function removeTag(id,tag){
  const t=trades.find(x=>x.id===id);if(!t)return;
  t.tags=(t.tags||[]).filter(x=>x!==tag);
  save();rerenderCurrent();
}
function addTagToCategory(cat,val){
  const raw=(val||'').trim();
  if(!raw)return;
  if(!tagCategories[cat])tagCategories[cat]=[];
  // Support comma-separated: "fomo, late-entry, oversized"
  const tags=raw.split(',').map(s=>s.trim().toLowerCase().replace(/\s+/g,'-')).filter(Boolean);
  let added=0;
  tags.forEach(tag=>{
    if(!tagCategories[cat].includes(tag)){tagCategories[cat].push(tag);added++;}
  });
  if(added>0){save();renderSettings();toast(`Added ${added} tag${added>1?'s':''} to ${cat}`);}
}
function removeTagFromCategory(cat,tag){
  if(!confirm('Remove tag "'+tag+'" from '+cat+'?'))return;
  tagCategories[cat]=(tagCategories[cat]||[]).filter(x=>x!==tag);
  save();renderSettings();
}

function saveEntry(){
  const tickerRaw=document.getElementById('f-ticker').value||'';
  const ticker=tickerRaw.toUpperCase().trim();
  const dir=document.getElementById('f-dir').value;
  const qtyRaw=document.getElementById('f-qty').value;
  const priceRaw=document.getElementById('f-price').value;
  const qty=parseInt(qtyRaw);
  const price=parseFloat(priceRaw);
  const date=document.getElementById('f-date').value||new Date().toISOString().split('T')[0];
  const type=document.getElementById('f-type').value;
  const parentId=document.getElementById('f-parent').value;
  const setup=document.getElementById('f-setup').value;
  const note=document.getElementById('f-notes').value||'';
  const isFutures=document.getElementById('f-futures').checked;
  const tickSize=parseFloat(document.getElementById('f-ticksize').value)||0;
  const tickValue=parseFloat(document.getElementById('f-tickvalue').value)||0;
  if(!ticker){alert('Please enter a ticker symbol.');return;}
  if(!qty||qty<=0){alert('Please enter a valid share quantity.');return;}
  if(!price||price<=0){alert('Please enter a valid price.');return;}
  const entry={d:date,qty,px:price};
  if(parentId==='new'){
    trades.unshift({
      id:Date.now(),ticker,dir,status:'open',
      isFutures,tickSize,tickValue,
      entries:type==='buy'?[entry]:[],
      exits:type==='sell'?[entry]:[],
      sl:0,tp:0,curPx:price,expanded:false,setup,note,tags:[],images:[]
    });
  }else{
    const t=trades.find(x=>x.id===parseInt(parentId));
    if(t){
      if(type==='buy')t.entries.push(entry);
      else t.exits.push(entry);
      if(tqty(t.exits)>=tqty(t.entries))t.status='closed';
    }
  }
  save();
  closeModal();
  document.getElementById('f-ticker').value='';
  document.getElementById('f-qty').value='';
  document.getElementById('f-price').value='';
  document.getElementById('f-notes').value='';
  document.getElementById('f-futures').checked=false;
  document.getElementById('f-ticksize').value='';
  document.getElementById('f-tickvalue').value='';
  renderPage(currentPage);
  toast('Trade saved — '+ticker+'!');
  // Auto-sync to Notion
  const newTrade=trades[0];
  if(newTrade)setTimeout(()=>sendToNotion(newTrade,false),400);
}

// ── Notion / Pipedream Sync ───────────────────────────────────────────
const PIPEDREAM_URL_DEFAULT='https://eomglep6gqjfe2v.m.pipedream.net';

function getWebhookUrl(){
  try{return localStorage.getItem('tj_webhook_url')||PIPEDREAM_URL_DEFAULT;}
  catch(e){return PIPEDREAM_URL_DEFAULT;}
}

async function sendToNotion(t, silent=false){
  const url=getWebhookUrl();
  if(!url){toast('⚠ No webhook URL set — check Settings');return;}
  const m=calc(t);
  const payload={
    ticker:       t.ticker,
    direction:    t.dir==='long'?'Long':'Short',
    status:       t.status==='open'?'Open':'Closed',
    entry_date:   t.entries[0]?.d||'',
    exit_date:    t.exits[t.exits.length-1]?.d||'',
    avg_entry:    m.ae,
    avg_exit:     m.ax||'',
    quantity:     m.te,
    stop_loss:    t.sl||'',
    target:       t.tp||'',
    realized_pnl: m.rpl,
    realized_pct: parseFloat((m.rpc/100).toFixed(4)),
    rr_ratio:     m.rr,
    is_futures:   t.isFutures?'Yes':'No',
    tick_size:    t.tickSize||'',
    tick_value:   t.tickValue||'',
    setup:        t.setup||'',
    tags:         (t.tags||[]).join(', '),
    notes:        t.note||'',
    source:       'Trade Journal HTML',
  };
  try{
    const res=await fetch(url,{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify(payload)
    });
    if(!silent){
      if(res.ok||res.status===200){
        toast('✓ '+t.ticker+' sent to Notion');
      } else {
        toast('⚠ Notion sync failed ('+res.status+')');
      }
    }
    return res.ok||res.status===200;
  }catch(e){
    if(!silent)toast('⚠ Notion sync error: '+e.message);
    return false;
  }
}

async function sendAllToNotion(){
  const btn=document.getElementById('sync-all-btn');
  if(btn){btn.textContent='Syncing...';btn.disabled=true;}
  let ok=0;
  for(const t of trades){
    const success=await sendToNotion(t,true);
    if(success)ok++;
    await new Promise(r=>setTimeout(r,300)); // rate limit
  }
  if(btn){btn.textContent='Sync all to Notion';btn.disabled=false;}
  toast(`✓ ${ok}/${trades.length} trades sent to Notion`);
}


const TF_ORDER=['1m','5m','15m','1H','4H','Daily','Weekly'];

function addScreenshots(id, input){
  const t=trades.find(x=>x.id===id);if(!t)return;
  if(!t.images)t.images=[];
  const files=Array.from(input.files);
  let done=0;
  files.forEach(file=>{
    const reader=new FileReader();
    reader.onload=e=>{
      // Detect timeframe from filename e.g. "ES_1H_entry.png"
      const name=file.name.toUpperCase();
      const tf=TF_ORDER.find(t=>name.includes(t.toUpperCase()))||'N/A';
      t.images.push({tf,data:e.target.result,name:file.name});
      done++;
      if(done===files.length){save();rerenderCurrent();toast(`${done} screenshot${done>1?'s':''} added`);}
    };
    reader.readAsDataURL(file);
  });
  input.value='';
}

function addScreenshotTf(id, tf, input){
  const t=trades.find(x=>x.id===id);if(!t)return;
  if(!t.images)t.images=[];
  const file=input.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=e=>{
    // Replace existing same-tf image or append
    const existing=t.images.findIndex(i=>i.tf===tf);
    const img={tf,data:e.target.result,name:file.name};
    if(existing>=0)t.images[existing]=img;
    else t.images.push(img);
    // Sort by TF_ORDER
    t.images.sort((a,b)=>TF_ORDER.indexOf(a.tf)-TF_ORDER.indexOf(b.tf));
    save();rerenderCurrent();toast(`${tf} screenshot saved`);
  };
  reader.readAsDataURL(file);
  input.value='';
}

function removeScreenshot(id,idx){
  const t=trades.find(x=>x.id===id);if(!t)return;
  t.images.splice(idx,1);save();rerenderCurrent();
}

let tvAuth={token:null,mdToken:null,expiry:null};
let tvPolling=null;
const TV_DEMO='https://demo.tradovateapi.com/v1';
const TV_LIVE='https://live.tradovateapi.com/v1';

function tvApiUrl(){
  const useLive=localStorage.getItem('tj_tv_live')==='true';
  return useLive?TV_LIVE:TV_DEMO;
}

async function tradovateLogin(){
  const creds={
    name:     document.getElementById('tv-user').value.trim(),
    password: document.getElementById('tv-pass').value.trim(),
    appId:    document.getElementById('tv-appid').value.trim()||'Sample App',
    appVersion:'1.0',
    deviceId: localStorage.getItem('tj_tv_device')||(()=>{const d=Math.random().toString(36).slice(2);localStorage.setItem('tj_tv_device',d);return d;})(),
    cid:      document.getElementById('tv-cid').value.trim(),
    sec:      document.getElementById('tv-sec').value.trim(),
  };
  if(!creds.name||!creds.password){alert('Enter username and password.');return;}
  setTvStatus('Connecting...','mut');
  try{
    const res=await fetch(tvApiUrl()+'/auth/accesstokenrequest',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify(creds)
    });
    const data=await res.json();
    if(data.errorText)throw new Error(data.errorText);
    tvAuth.token=data.accessToken;
    tvAuth.expiry=Date.now()+(data.expirationTime||3600)*1000;
    localStorage.setItem('tj_tv_token',data.accessToken);
    setTvStatus('Connected ✓','g');
    document.getElementById('tv-sync-btn').disabled=false;
    document.getElementById('tv-auto-btn').disabled=false;
    toast('Tradovate connected!');
    await syncTradovate();
  }catch(e){
    setTvStatus('Error: '+e.message,'mut');
  }
}

async function syncTradovate(){
  if(!tvAuth.token){alert('Connect to Tradovate first.');return;}
  setTvStatus('Syncing orders...','b');
  try{
    const [fillsRes,posRes]=await Promise.all([
      fetch(tvApiUrl()+'/order/list',{headers:{Authorization:'Bearer '+tvAuth.token}}),
      fetch(tvApiUrl()+'/position/list',{headers:{Authorization:'Bearer '+tvAuth.token}})
    ]);
    const fills=await fillsRes.json();
    const positions=await posRes.json();
    let imported=0;
    // Map Tradovate fills to journal trades
    (Array.isArray(fills)?fills:[]).forEach(order=>{
      if(order.ordStatus!=='Filled'&&order.ordStatus!=='PartiallyFilled')return;
      const existing=trades.find(t=>t.tradovateId===order.id);
      if(existing)return; // already imported
      const isBuy=order.action==='Buy';
      const ticker=(order.contractId||'').toString();
      const price=order.avgPx||order.price||0;
      const qty=order.filledQty||order.qty||1;
      const date=order.timestamp?order.timestamp.split('T')[0]:new Date().toISOString().split('T')[0];
      // Find open trade for this ticker to add as tranche, or create new
      const open=trades.find(t=>t.ticker===ticker&&t.status==='open');
      if(open&&((isBuy&&open.dir==='long')||((!isBuy)&&open.dir==='short'))){
        open.entries.push({d:date,qty,px:price});
      } else if(open&&(((!isBuy)&&open.dir==='long')||(isBuy&&open.dir==='short'))){
        open.exits.push({d:date,qty,px:price});
        if(tqty(open.exits)>=tqty(open.entries))open.status='closed';
      } else {
        trades.unshift({
          id:Date.now()+Math.random(),
          tradovateId:order.id,
          ticker,
          dir:isBuy?'long':'short',
          status:'open',
          isFutures:true,
          tickSize:0.25,tickValue:12.50, // default ES; user can adjust
          entries:isBuy?[{d:date,qty,px:price}]:[],
          exits:(!isBuy)?[{d:date,qty,px:price}]:[],
          sl:0,tp:0,curPx:price,
          expanded:false,setup:'',note:'[Auto-imported from Tradovate]',
          tags:['tradovate'],images:[]
        });
      }
      imported++;
    });
    save();
    setTvStatus(`Synced — ${imported} new fill${imported!==1?'s':''}${positions.length?' · '+positions.length+' position(s)':''}  ✓`,'g');
    if(imported>0){renderPage(currentPage);toast(`${imported} Tradovate fill${imported!==1?'s':''} imported`);}
    else toast('Tradovate: no new fills');
  }catch(e){
    setTvStatus('Sync error: '+e.message,'mut');
  }
}

  t.status='closed';
  save();
  rerenderCurrent();
  toast(t.ticker+' marked as closed.');
}

let _closeTargetId=null;
function openCloseModal(id){
  const t=trades.find(x=>x.id===id);
  if(!t)return;
  _closeTargetId=id;
  const m=calc(t);
  document.getElementById('close-modal-info').textContent=
    t.ticker+' · '+t.dir.toUpperCase()+' · '+m.oq+' open shares · Avg entry $'+m.ae.toFixed(2);
  document.getElementById('c-price').value='';
  document.getElementById('c-qty').value=m.oq;
  document.getElementById('c-date').value=new Date().toISOString().split('T')[0];
  document.getElementById('c-partial').value='full';
  document.getElementById('close-modal').style.display='flex';
}

function saveClose(){
  const t=trades.find(x=>x.id===_closeTargetId);
  if(!t)return;
  const price=parseFloat(document.getElementById('c-price').value);
  const date=document.getElementById('c-date').value||new Date().toISOString().split('T')[0];
  const partial=document.getElementById('c-partial').value;
  const m=calc(t);
  const qty=partial==='full'?m.oq:(parseInt(document.getElementById('c-qty').value)||m.oq);
  if(!price||price<=0){alert('Please enter a valid exit price.');return;}
  if(qty<=0||qty>m.oq){alert('Quantity must be between 1 and '+m.oq+' shares.');return;}
  t.exits.push({d:date,qty,px:price});
  if(tqty(t.exits)>=tqty(t.entries))t.status='closed';
  save();
  document.getElementById('close-modal').style.display='none';
  const pnl=f2((price-m.ae)*qty*(t.dir==='long'?1:-1));
  renderPage(currentPage);
  toast(t.ticker+' closed · P&L: '+(pnl>=0?'+':'')+' $'+pnl.toFixed(2));
}


// ── CSV Import Engine ─────────────────────────────────────────────────
let _pendingImport=[];

function handleCsvImport(input){
  const file=input.files[0];if(!file)return;
  input.value='';
  const reader=new FileReader();
  reader.onload=e=>parseCsv(e.target.result,file.name);
  reader.readAsText(file);
}

function parseCsv(raw,filename){
  const lines=raw.trim().split('\n').map(l=>l.trim()).filter(Boolean);
  if(lines.length<2){alert('CSV appears empty.');return;}
  const headers=csvSplit(lines[0]).map(h=>h.replace(/['"]/g,'').trim().toLowerCase());
  const hStr=headers.join(',');
  let format='generic';
  if(hStr.includes('b/s')||hStr.includes('avg fill price')||hStr.includes('fill time')||hStr.includes('_ticksize')||filename.toLowerCase().includes('tradovate')) format='tradovate';
  else if(hStr.includes('exectime')||hStr.includes('marketpos')||filename.toLowerCase().includes('ninja')) format='ninjatrader';
  else if(hStr.includes('ibcommission')||hStr.includes('t. price')||filename.toLowerCase().includes('ibkr')) format='ibkr';

  const rows=lines.slice(1).map(l=>{const vals=csvSplit(l);const obj={};headers.forEach((h,i)=>obj[h]=(vals[i]||'').replace(/['"]/g,'').trim());return obj;});
  const fills=[];

  if(format==='tradovate'){
    // Exact Tradovate Orders CSV headers:
    // orderId, Account, Order ID, B/S, Contract, Product, avgPrice, filledQty, Fill Time, Status, _tickSize, Date, Qty, Avg Fill Price
    rows.forEach(r=>{
      const status=(r['status']||'').toLowerCase();
      if(!status.includes('fill')&&status!=='filled') return; // only filled orders
      const side=(r['b/s']||r['action']||r['side']||'').toUpperCase();
      const ticker=(r['contract']||r['product']||r['contractid']||r['symbol']||'').toUpperCase().split(' ')[0]; // strip expiry e.g. "ESM5" → keep as-is
      const price=parseFloat(r['avg fill price']||r['avgprice']||r['price']||0);
      const qty=parseFloat(r['filled qty']||r['filledqty']||r['qty']||r['quantity']||1);
      const date=fmtDate(r['fill time']||r['timestamp']||r['date']||'');
      const tickSize=parseFloat(r['_ticksize']||r['ticksize']||0);
      if(!ticker||!price||!qty) return;
      fills.push({
        ticker,
        action:side==='B'||side==='BUY'||side.startsWith('B')?'buy':'sell',
        qty,price,date,
        tickSize:tickSize||null,
        broker:'Tradovate'
      });
    });
  } else if(format==='ninjatrader'){
    rows.forEach(r=>{
      const pos=(r['marketpos']||r['market pos']||'').toLowerCase();
      const qty=parseFloat(r['qty']||r['quantity']||1);
      const price=parseFloat(r['price']||r['entry price']||0);
      if(!price)return;
      fills.push({ticker:(r['instrument']||r['symbol']||'').toUpperCase(),action:pos.includes('long')?'buy':'sell',qty,price,date:fmtDate(r['entrytime']||r['entry time']||r['date']||''),broker:'NinjaTrader'});
      // Also add exit fill if present
      const exitPrice=parseFloat(r['exit price']||0);
      if(exitPrice){fills.push({ticker:(r['instrument']||'').toUpperCase(),action:pos.includes('long')?'sell':'buy',qty,price:exitPrice,date:fmtDate(r['exittime']||r['exit time']||''),broker:'NinjaTrader'});}
    });
  } else if(format==='ibkr'){
    rows.forEach(r=>{
      const qty=parseFloat(r['quantity']||0);if(!qty)return;
      fills.push({ticker:(r['symbol']||'').toUpperCase(),action:qty>=0?'buy':'sell',qty:Math.abs(qty),price:parseFloat(r['t. price']||r['price']||0),date:fmtDate(r['datetime']||r['date']||''),broker:'IBKR'});
    });
  } else {
    rows.forEach(r=>{
      const sym=r['symbol']||r['ticker']||r['instrument']||r['contract']||'';
      const action=(r['action']||r['side']||r['type']||r['buysell']||'buy').toLowerCase();
      const qty=parseFloat(r['qty']||r['quantity']||r['shares']||r['contracts']||1);
      const price=parseFloat(r['price']||r['avgpx']||r['fill price']||r['avg price']||0);
      if(!sym||!price)return;
      fills.push({ticker:sym.toUpperCase(),action:action.includes('buy')?'buy':'sell',qty,price,date:fmtDate(r['date']||r['timestamp']||r['time']||''),broker:'CSV'});
    });
  }
  if(!fills.length){alert('No filled orders found.\n\nMake sure your CSV has a header row and includes columns for symbol, action (buy/sell), quantity, and price.');return;}
  _pendingImport=fills;
  showImportPreview(fills,format,filename);
}

function csvSplit(line){
  const result=[];let cur='',inQ=false;
  for(let i=0;i<line.length;i++){
    const c=line[i];
    if(c==='"'){inQ=!inQ;}else if(c===','&&!inQ){result.push(cur);cur='';}else cur+=c;
  }result.push(cur);return result;
}

function fmtDate(str){
  if(!str)return new Date().toISOString().split('T')[0];
  const d=new Date(str);
  if(!isNaN(d))return d.toISOString().split('T')[0];
  const m=str.match(/(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{2,4})/);
  if(m)return `${m[3].length===2?'20'+m[3]:m[3]}-${m[1].padStart(2,'0')}-${m[2].padStart(2,'0')}`;
  return new Date().toISOString().split('T')[0];
}

function showImportPreview(fills,format,filename){
  const modal=document.getElementById('import-modal');
  document.getElementById('import-source-label').textContent=`Detected: ${format.toUpperCase()} — ${filename}`;
  document.getElementById('import-summary').textContent=`${fills.length} fill${fills.length!==1?'s':''} found. Review below then confirm.`;
  const dupes=fills.filter(f=>trades.some(t=>t.entries.concat(t.exits).some(e=>e.d===f.date&&e.px===f.price&&e.qty===f.qty)));
  document.getElementById('import-conflict-note').textContent=dupes.length?`⚠ ${dupes.length} possible duplicate(s) will be skipped`:'';
  document.getElementById('import-thead').innerHTML='<th style="padding:7px 12px;font-size:10px;font-weight:700;color:var(--text3);letter-spacing:.07em">Ticker</th><th style="padding:7px 12px;font-size:10px;font-weight:700;color:var(--text3)">Action</th><th style="padding:7px 12px;font-size:10px;font-weight:700;color:var(--text3)">Qty</th><th style="padding:7px 12px;font-size:10px;font-weight:700;color:var(--text3)">Price</th><th style="padding:7px 12px;font-size:10px;font-weight:700;color:var(--text3)">Date</th><th style="padding:7px 12px;font-size:10px;font-weight:700;color:var(--text3)">Status</th>';
  document.getElementById('import-tbody').innerHTML=fills.map(f=>{
    const isDupe=trades.some(t=>t.entries.concat(t.exits).some(e=>e.d===f.date&&e.px===f.price&&e.qty===f.qty));
    return`<tr style="border-top:1px solid rgba(42,48,80,0.5);${isDupe?'opacity:0.35':''}">
      <td style="padding:7px 12px;font-weight:600">${f.ticker}</td>
      <td style="padding:7px 12px;color:${f.action==='buy'?'var(--green)':'var(--text2)'};font-weight:600;font-size:11px;text-transform:uppercase">${f.action}</td>
      <td style="padding:7px 12px">${f.qty}</td>
      <td style="padding:7px 12px">$${f.price.toFixed(2)}</td>
      <td style="padding:7px 12px;color:var(--text2)">${f.date}</td>
      <td style="padding:7px 12px;font-size:10px;color:${isDupe?'var(--text3)':'var(--green)'}">${isDupe?'skip':'✓ new'}</td>
    </tr>`;
  }).join('');
  modal.style.display='flex';
}

function confirmImport(){
  let imported=0,skipped=0;
  _pendingImport.forEach(f=>{
    const isDupe=trades.some(t=>t.entries.concat(t.exits).some(e=>e.d===f.date&&e.px===f.price&&e.qty===f.qty));
    if(isDupe){skipped++;return;}
    const entry={d:f.date,qty:f.qty,px:f.price};
    const openMatch=trades.find(t=>t.ticker===f.ticker&&t.status==='open'&&((f.action==='buy'&&t.dir==='long')||(f.action==='sell'&&t.dir==='short')));
    const closeMatch=trades.find(t=>t.ticker===f.ticker&&t.status==='open'&&((f.action==='sell'&&t.dir==='long')||(f.action==='buy'&&t.dir==='short')));
    if(openMatch){openMatch.entries.push(entry);}
    else if(closeMatch){closeMatch.exits.push(entry);if(tqty(closeMatch.exits)>=tqty(closeMatch.entries))closeMatch.status='closed';}
    else{
      const futureTickers=['ES','NQ','MES','MNQ','CL','MCL','GC','MGC','RTY','YM','MYM'];
      const isFut=futureTickers.some(ft=>f.ticker.startsWith(ft));
      const preset=isFut?(FUTURES_PRESETS[f.ticker.slice(0,3)]||FUTURES_PRESETS[f.ticker.slice(0,2)]||{}): {};
      // Use tickSize from CSV if available, otherwise fall back to preset
      const tickSize=f.tickSize||preset.tickSize||0;
      const tickValue=preset.tickValue||0;
      trades.unshift({id:Date.now()+Math.random(),ticker:f.ticker,dir:f.action==='buy'?'long':'short',status:'open',isFutures:isFut,tickSize,tickValue,entries:f.action==='buy'?[entry]:[],exits:f.action==='sell'?[entry]:[],sl:0,tp:0,curPx:f.price,expanded:false,setup:'',note:`Imported from ${f.broker}`,tags:['imported'],images:[]});
    }
    imported++;
  });
  save();
  document.getElementById('import-modal').style.display='none';
  _pendingImport=[];
  renderPage(currentPage);
  toast(`✓ ${imported} fill${imported!==1?'s':''} imported${skipped?` · ${skipped} skipped`:''}`);
  if(imported>0){
    setTimeout(async()=>{
      const newTrades=trades.slice(0,imported);
      let synced=0;
      for(const t of newTrades){const ok=await sendToNotion(t,true);if(ok)synced++;await new Promise(r=>setTimeout(r,350));}
      toast(`✓ ${synced} trade${synced!==1?'s':''} synced to Notion`);
    },800);
  }
}

async function testWebhook(){
  const url=getWebhookUrl();
  toast('Testing webhook...');
  try{
    const res=await fetch(url,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({test:true,source:'Trade Journal',message:'Connection test from Trade Journal HTML'})});
    toast(res.ok||res.status===200?'✓ Webhook connected! Check Pipedream.':'⚠ Webhook responded with '+res.status);
  }catch(e){toast('⚠ Connection failed: '+e.message);}
}

function exportCSV(){
  const hdr=['Ticker','Direction','Status','Entry Date','Avg Entry','Avg Exit','Shares','Stop Loss','Target','Realized P&L $','Realized P&L %','R:R','Setup','Notes'];
  const rows=trades.map(t=>{
    const m=calc(t);
    return[t.ticker,t.dir,t.status,t.entries[0]?.d||'',m.ae.toFixed(2),t.exits.length?m.ax.toFixed(2):'',m.te,t.sl,t.tp,m.rpl.toFixed(2),(m.rpc/100).toFixed(4),m.rr.toFixed(2),t.setup||'',t.note||''];
  });
  const csv=[hdr,...rows].map(r=>r.map(c=>`"${c}"`).join(',')).join('\n');
  const a=document.createElement('a');
  a.href='data:text/csv;charset=utf-8,'+encodeURIComponent(csv);
  a.download='trade_journal.csv';a.click();
  toast('CSV exported!');
}

// ── Toast ─────────────────────────────────────────────────────────────
function toast(msg){
  const el=document.getElementById('toast');
  el.textContent=msg;el.classList.add('show');
  clearTimeout(window._t);window._t=setTimeout(()=>el.classList.remove('show'),3000);
}

renderDashboard();
